name: Cross-Compile for Kaggle

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]

    steps:
    - uses: actions/checkout@v4

    - name: Install cross
      run: cargo install cross

    - name: Build release
      run: cross build --target ${{ matrix.target }} --release

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: fiuld-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/fiuld
